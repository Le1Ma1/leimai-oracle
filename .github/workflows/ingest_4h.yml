name: ingest-market-4h

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Dispatch reason"
        required: false
        default: "manual"
      detected_lag_hours:
        description: "Heartbeat detected lag hours"
        required: false
        default: ""
      latest_report_ts_utc:
        description: "Latest report timestamp observed by heartbeat monitor"
        required: false
        default: ""

concurrency:
  group: ingest-market-4h
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Ingest market signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGEST_SYMBOLS: BTCUSDT,ETHUSDT,SOLUSDT
          BINANCE_FAPI_BASE_URL: https://fapi.binance.com
          ANOMALY_RANGE_THRESHOLD_PCT: "5"
          ANOMALY_OI_DROP_THRESHOLD_PCT: "3"
          BINANCE_HTTP_TIMEOUT_SEC: "12"
          BINANCE_HTTP_RETRIES: "3"
        run: |
          python -m engine.src.ingest_market

      - name: Generate oracle reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash
          REPORT_USE_MOCK_LLM: "false"
          REPORT_LOCALES: en,zh-tw
          REPORT_HTTP_TIMEOUT_SEC: "20"
          REPORT_HTTP_RETRIES: "3"
          ORACLE_UNIQUE_ENTITY: LeiMai Liquidity Friction
        run: |
          python -m engine.src.generate_reports

      - name: Snapshot preflight
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SNAPSHOT_REPORT_LIMIT: "80"
          VISUAL_TIMEOUT_SEC: "20"
          BINANCE_SPOT_BASE_URL: https://api.binance.com
        run: |
          mkdir -p logs
          python - <<'PY'
          import json
          import os
          payload = {
              "event": "SNAPSHOT_PREFLIGHT",
              "has_supabase_url": bool(os.getenv("SUPABASE_URL", "").strip()),
              "has_service_role_key": bool(os.getenv("SUPABASE_SERVICE_ROLE_KEY", "").strip()),
              "snapshot_report_limit": os.getenv("SNAPSHOT_REPORT_LIMIT", ""),
              "visual_timeout_sec": os.getenv("VISUAL_TIMEOUT_SEC", ""),
              "binance_spot_base_url": os.getenv("BINANCE_SPOT_BASE_URL", ""),
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY

      - name: Generate offline oracle snapshots (retry transient)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BINANCE_SPOT_BASE_URL: https://api.binance.com
          VISUAL_TIMEOUT_SEC: "20"
          SNAPSHOT_REPORT_LIMIT: "80"
        run: |
          set -eo pipefail
          mkdir -p logs
          run_snapshot() {
            python scripts/visual_snapshot.py --mode report --limit 80
          }
          run_snapshot 2>&1 | tee logs/report_snapshot_step.log || SNAP_EXIT=$?
          if [ "${SNAP_EXIT:-0}" -ne 0 ]; then
            if grep -Eiq "report_fetch_failed_transient|report_fetch_timeout_transient|http_429|http_5[0-9]{2}|timeout|timed out|connection reset|temporar" logs/report_snapshot_step.log; then
              echo "Transient snapshot failure detected; retrying once..."
              sleep 8
              run_snapshot 2>&1 | tee -a logs/report_snapshot_step.log
            else
              exit "${SNAP_EXIT}"
            fi
          fi

      - name: Upload snapshot diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-snapshot-diagnostics-${{ github.run_id }}
          path: |
            logs/report_snapshot_step.log
            logs/report_snapshot_diagnostics.json
          if-no-files-found: warn

      - name: Submit sitemap to Google Search Console
        continue-on-error: true
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SUPPORT_BASE_URL: ${{ vars.SUPPORT_BASE_URL }}
        run: |
          python scripts/seo_ping.py

      - name: Profile wallet entities
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEBANK_API_KEY: ${{ secrets.DEBANK_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          RPC_URL_ETH: https://cloudflare-eth.com
          ENTITY_PROFILER_TIMEOUT_SEC: "12"
          ENTITY_ETH_USD_FALLBACK: "3000"
        run: |
          python scripts/entity_profiler.py --limit 300 --lookback-hours 96
