name: harvest-payments-5m

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Dispatch reason"
        required: false
        default: "manual"

concurrency:
  group: harvest-payments-5m
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Harvest chain payments
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPPORT_TRC20_ADDRESS: ${{ vars.TRON_USDT_RECIPIENT }}
          SUPPORT_TRONGRID_API_KEY: ${{ secrets.SUPPORT_TRONGRID_API_KEY }}
          SUPPORT_TRONSCAN_API_BASE: https://apilist.tronscanapi.com
          SUPPORT_TRONGRID_API_BASE: https://api.trongrid.io
          CHAIN_HARVEST_LOOKBACK_MIN: "20"
          CHAIN_HARVEST_TIMEOUT_SEC: "12"
          CHAIN_HARVEST_RETRIES: "3"
          CHAIN_HARVEST_AMOUNT_TOL: "0.000001"
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ETH_L1_ERC20_RECIPIENT: ${{ vars.ETH_L1_ERC20_RECIPIENT }}
          L2_NETWORK: ${{ vars.L2_NETWORK }}
          L2_USDC_RECIPIENT: ${{ vars.L2_USDC_RECIPIENT }}
        run: |
          python scripts/chain_harvester.py
