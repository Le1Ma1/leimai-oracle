name: oracle-heartbeat-1h

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: oracle-heartbeat-1h
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Monitor heartbeat and self-heal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HEARTBEAT_MAX_AGE_HOURS: "5"
          HEARTBEAT_EVENT_TYPE: oracle_report_pipeline_stale
          HEARTBEAT_ENABLE_DISPATCH: "true"
          HEARTBEAT_DISPATCH_WORKFLOW: ingest_4h.yml
          HEARTBEAT_DISPATCH_REF: main
          HEARTBEAT_HTTP_TIMEOUT_SEC: "12"
          HEARTBEAT_HTTP_RETRIES: "3"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO }}
        run: |
          python -m engine.src.monitor_heartbeat
