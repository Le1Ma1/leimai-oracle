name: autonomic-evolution

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: autonomic-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install node dependencies
        run: npm ci

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow requests python-dotenv
          python -m playwright install --with-deps chromium

      - name: Start support server
        run: |
          node support/server.mjs > /tmp/support_server.log 2>&1 &
          echo $! > /tmp/support_server.pid
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4310/ > /dev/null; then
              echo "support server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "support server failed to boot in time"
          cat /tmp/support_server.log || true
          exit 1

      - name: Update visual memory snapshot
        env:
          SUPPORT_BASE_URL: http://127.0.0.1:4310
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash
          VISUAL_TIMEOUT_SEC: "25"
        run: |
          python scripts/visual_snapshot.py

      - name: Run visual self-tune
        run: |
          python scripts/visual_autotune.py

      - name: Validate evolution integrity (retry transient)
        env:
          SUPPORT_BASE_URL: http://127.0.0.1:4310
          EVOLUTION_MIN_SCORE: "95"
        run: |
          set -eo pipefail
          mkdir -p logs
          run_validator() {
            python scripts/evolution_validator.py
          }
          run_validator 2>&1 | tee logs/evolution_validator_step.log || VALID_EXIT=$?
          if [ "${VALID_EXIT:-0}" -ne 0 ]; then
            if grep -Eiq "timeout|timed out|http_429|http_5[0-9]{2}|connection reset|temporar|dns|page_unreachable" logs/evolution_validator_step.log; then
              echo "Transient validator failure detected; retrying once..."
              sleep 8
              run_validator 2>&1 | tee -a logs/evolution_validator_step.log
            else
              exit "${VALID_EXIT}"
            fi
          fi

      - name: Summarize evolution validation
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("logs/evolution_validation.json")
          if not path.exists():
            print("EVOLUTION_VALIDATION_SUMMARY missing_evolution_validation_json")
            raise SystemExit(0)
          payload = json.loads(path.read_text(encoding="utf-8"))
          summary = {
            "pass": bool(payload.get("pass", False)),
            "reason_code": payload.get("reason_code", ""),
            "issue_count": int(payload.get("issue_count", 0) or 0),
            "score_total": float((payload.get("score") or {}).get("total", 0.0) or 0.0),
            "threshold": float(payload.get("threshold", 0.0) or 0.0),
            "transient_issue": bool(payload.get("transient_issue", False)),
          }
          print("EVOLUTION_VALIDATION_SUMMARY", json.dumps(summary, ensure_ascii=False))
          Path("logs/evolution_validation_summary.json").write_text(
            json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          PY

      - name: Upload evolution diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autonomic-evolution-diagnostics-${{ github.run_id }}
          path: |
            logs/evolution_validator_step.log
            logs/evolution_validation.json
            logs/evolution_validation_summary.json
            /tmp/support_server.log
          if-no-files-found: warn

      - name: Verify visual memory artifacts
        run: |
          test -s logs/current_vibe.png
          test -s logs/visual_state.json
          test -s logs/visual_tune.json
          test -s logs/evolution_validation.json
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("logs/visual_state.json").read_text(encoding="utf-8"))
          checks = data.get("checks", {})
          if checks.get("index_has_reports", False) and not checks.get("detail_is_real_report", False):
            raise SystemExit("detail_is_real_report=false")
          print("visual detail page validation passed")
          PY
          echo "visual artifacts verified"

      - name: Stop support server
        if: always()
        run: |
          if [ -f /tmp/support_server.pid ]; then
            kill "$(cat /tmp/support_server.pid)" 2>/dev/null || true
          fi

      - name: Commit and push visual evolution
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/current_vibe.png logs/visual_state.json logs/visual_tune.json logs/evolution_validation.json support/web/ouroboros.css support/server.mjs
          if git diff --cached --quiet; then
            echo "No visual changes detected."
            exit 0
          fi
          git commit -m "chore(visual): autonomic vibe evolution [skip ci]"
          git push
