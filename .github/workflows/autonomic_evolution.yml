name: autonomic-evolution

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: autonomic-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install node dependencies
        run: npm ci

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow requests python-dotenv
          python -m playwright install --with-deps chromium

      - name: Start support server
        run: |
          node support/server.mjs > /tmp/support_server.log 2>&1 &
          echo $! > /tmp/support_server.pid
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4310/ > /dev/null; then
              echo "support server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "support server failed to boot in time"
          cat /tmp/support_server.log || true
          exit 1

      - name: Update visual memory snapshot
        env:
          SUPPORT_BASE_URL: http://127.0.0.1:4310
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash
          VISUAL_TIMEOUT_SEC: "25"
        run: |
          python scripts/visual_snapshot.py

      - name: Run visual self-tune
        run: |
          python scripts/visual_autotune.py

      - name: Stop support server
        if: always()
        run: |
          if [ -f /tmp/support_server.pid ]; then
            kill "$(cat /tmp/support_server.pid)" 2>/dev/null || true
          fi

      - name: Commit and push visual evolution
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/current_vibe.png logs/visual_state.json logs/visual_tune.json support/web/ouroboros.css support/server.mjs
          if git diff --cached --quiet; then
            echo "No visual changes detected."
            exit 0
          fi
          git commit -m "chore(visual): autonomic vibe evolution [skip ci]"
          git push
