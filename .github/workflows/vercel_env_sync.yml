name: vercel-env-sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/vercel_ops.py"
      - ".github/workflows/vercel_env_sync.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: vercel-env-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Sync GitHub variables to Vercel envs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_TARGETS: production,preview,development
          VERCEL_ENABLE_DOMAIN_SYNC: "true"
          VERCEL_PRIMARY_DOMAIN: leimai.io
          VERCEL_SUPPORT_DOMAIN: support.leimai.io
          VERCEL_WWW_DOMAIN: www.leimai.io
          VERCEL_REDIRECT_SOURCE_DOMAINS: leimaitech.com,www.leimaitech.com,support.leimaitech.com
          VERCEL_REDIRECT_STATUS: "301"
          VERCEL_TRIGGER_DEPLOY: "true"
        run: |
          python scripts/vercel_ops.py --retry 3 --timeout-sec 15

      - name: Sync Cloudflare DNS for leimai.io
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_NAME: leimai.io
          CF_RECORDS: "@,www,support"
          CF_TARGET: cname.vercel-dns.com
          CF_PROXY: "false"
          CF_TTL: "1"
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN not configured; skip DNS sync."
            exit 0
          fi
          python scripts/cloudflare_ops.py --retry 3 --timeout-sec 15
