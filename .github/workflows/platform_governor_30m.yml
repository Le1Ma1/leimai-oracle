name: platform-governor-30m

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks without triggering heal actions"
        required: false
        default: "false"

permissions:
  contents: read
  actions: write

concurrency:
  group: platform-governor-30m
  cancel-in-progress: false

jobs:
  govern:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run platform governor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPPORT_BASE_URL: ${{ vars.SUPPORT_BASE_URL }}
          PLATFORM_GOVERNOR_STALE_REPORT_HOURS: "6"
          PLATFORM_GOVERNOR_MAX_ACTIONS: "4"
          PLATFORM_GOVERNOR_TIMEOUT_SEC: "12"
          PLATFORM_GOVERNOR_RETRIES: "3"
          PLATFORM_GOVERNOR_AUTO_HEAL: "true"
          PLATFORM_GOVERNOR_FAIL_ON_CRITICAL: "false"
        run: |
          DRY_INPUT="${{ github.event.inputs.dry_run }}"
          if [ "${DRY_INPUT}" = "true" ]; then
            python scripts/platform_governor.py --dry-run
          else
            python scripts/platform_governor.py
          fi

      - name: Probe platform sync integrity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_TEAM_ID }}
          SUPPORT_BASE_URL: ${{ vars.SUPPORT_BASE_URL }}
        run: |
          python scripts/platform_sync_probe.py

      - name: Upload governor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-governor-artifacts-${{ github.run_id }}
          path: |
            logs/platform_governor_report.json
            logs/platform_governor_actions.jsonl
            logs/platform_sync_status.json
          if-no-files-found: warn
